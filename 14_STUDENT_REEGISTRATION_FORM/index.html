<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=, initial-scale=1.0">
    <title>Student Registration Form</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="form-container">
        <h1>Student Registration Form</h1>
        <form>
            <label for="first">User Name:</label>
            <input type="text" name="Name" id="first" placeholder="Enter Your First Name">
            <label for="second">Last Name:</label>
            <input type="text" name="LastName" id="second" placeholder="Enter Your Last Name">
            <label for="third">Age:</label>
            <input type="number" name="Age" id="third" placeholder="Enter Your Age">
            <button type="submit">Submit</button>
        </form>
        <div id="result"></div>

    </div>
    <script src="script.js"></script>
</body>

</html>
