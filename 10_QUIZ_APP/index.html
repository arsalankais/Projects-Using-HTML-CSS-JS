<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Quiz App</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="quiz-container">
        <h1>🏏 Cricket Quiz</h1>
        <form id="quizform">
            <div class="question">
                <p>1. How many players are there in a cricket team?</p>

                <label>
                    <input type="radio" name="q1" value="9">
                    9
                </label>

                <label>
                    <input type="radio" name="q1" value="10">
                    10
                </label>

                <label>
                    <input type="radio" name="q1" value="11">
                    11
                </label>

                <label>
                    <input type="radio" name="q1" value="12">
                    12
                </label>
            </div>

            <div class="question">
                <p>2. Which country won the first Cricket World Cup?</p>

                <label>
                    <input type="radio" name="q2" value="India">
                    India
                </label>

                <label>
                    <input type="radio" name="q2" value="Australia">
                    Australia
                </label>

                <label>
                    <input type="radio" name="q2" value="West Indies">
                    West Indies
                </label>

                <label>
                    <input type="radio" name="q2" value="England">
                    England
                </label>
            </div>

            <div class="question">
                <p>3. What does LBW stand for?</p>

                <label>
                    <input type="radio" name="q3" value="Leg Before Wicket">
                    Leg Before Wicket
                </label>

                <label>
                    <input type="radio" name="q3" value="Long Bat Wide">
                    Long Bat Wide
                </label>

                <label>
                    <input type="radio" name="q3" value="Left Ball Win">
                    Left Ball Win
                </label>

                <label>
                    <input type="radio" name="q3" value="Leg Ball Wide">
                    Leg Ball Wide
                </label>
            </div>

            <button>Submit Quiz</button>

        </form>
        <div id="out"></div>
    </div>
    <script src="script.js"></script>
</body>

</html>
